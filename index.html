<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>EmailRefiner.site</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* HBL Blue Color Scheme */
        .hbl-blue { background-color: #004a99; }
        .hbl-light { background-color: #eef6ff; }
        .tone-btn { background: white; border: 1px solid #004a99; color: #004a99; transition: all 0.3s; }
        .tone-btn:hover { background: #004a99; color: white; }
        .active-btn { background-color: #004a99 !important; color: white !important; }
    </style>
</head>
<body class="bg-slate-100 p-6">
    <div class="max-w-md mx-auto bg-white p-8 rounded-2xl shadow-sm border border-slate-200">
        
        <div class="text-center mb-8">
            <div class="w-16 h-16 hbl-blue rounded-xl mx-auto flex items-center justify-center text-white text-3xl font-bold mb-4 shadow-md">ER</div>
            <h1 class="text-2xl font-bold text-[#004a99]">EmailRefiner.site</h1>
        </div>

        <div class="grid grid-cols-2 gap-3 mb-6">
            <button onclick="selectTone(this, 'Professional')" class="tone-btn active-btn p-3 rounded-lg font-semibold">Professional</button>
            <button onclick="selectTone(this, 'Friendly')" class="tone-btn p-3 rounded-lg font-semibold">Friendly</button>
            <button onclick="selectTone(this, 'Formal')" class="tone-btn p-3 rounded-lg font-semibold">Formal</button>
            <button onclick="selectTone(this, 'Concise')" class="tone-btn p-3 rounded-lg font-semibold">Concise</button>
        </div>

        <textarea id="input" class="w-full h-32 p-4 bg-slate-50 border border-slate-300 rounded-lg mb-6 focus:ring-2 focus:ring-blue-200 outline-none" placeholder="Enter your draft..."></textarea>
        
        <button onclick="refineEmail()" class="w-full hbl-blue text-white py-3 rounded-lg font-bold text-lg hover:bg-blue-900 transition">Transform Draft</button>

        <div id="outputContainer" class="hidden mt-6">
            <div id="output" class="p-5 hbl-light text-[#004a99] rounded-lg border border-blue-200 whitespace-pre-line mb-4 font-medium leading-relaxed"></div>
            <button onclick="copyToClipboard()" class="w-full bg-slate-200 text-slate-700 py-3 rounded-lg font-bold hover:bg-slate-300">Copy to Clipboard</button>
        </div>
    </div>

    <script>
        let currentTone = "Professional";
        function selectTone(btn, tone) {
            document.querySelectorAll('.tone-btn').forEach(b => b.classList.remove('active-btn'));
            btn.classList.add('active-btn');
            currentTone = tone;
        }

        function refineEmail() {
            const text = document.getElementById('input').value;
            const templates = {
                "Professional": `Dear Team,\n\nI am writing to formally communicate that due to unforeseen personal obligations, I anticipate a delay in my arrival today. I expect to be on-site by 12:00 PM. I appreciate your understanding.\n\nBest regards,\n[Your Name]`,
                "Friendly": `Hi team,\n\nI wanted to let you know I'm running a bit behind today due to some personal tasks at home. I'll be in by 12:00 PM. Thanks for your flexibility!\n\nBest,\n[Your Name]`,
                "Formal": `Dear Colleagues,\n\nPlease be advised of my delayed arrival today, effective until 12:00 PM, due to external personal commitments. I apologize for any inconvenience.\n\nSincerely,\n[Your Name]`,
                "Concise": `Team,\n\nRunning late today. I'll be in by 12:00 PM. Thanks!\n\nBest,\n[Your Name]`
            };
            document.getElementById('output').innerText = templates[currentTone];
            document.getElementById('outputContainer').classList.remove('hidden');
        }

        function copyToClipboard() {
            navigator.clipboard.writeText(document.getElementById('output').innerText);
            alert("Copied!");
        }
    </script>
</body>
</html>
