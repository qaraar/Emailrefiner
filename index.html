<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EmailRefiner Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;700&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #f8fafc; }
        
        .premium-card { background: #ffffff; border: 1px solid #e2e8f0; box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.05); }
        
        /* گرین بٹن اسٹائل */
        .emerald-btn { background-color: #059669; color: white; }
        .emerald-btn:hover { background-color: #047857; }
        .active-btn { background-color: #065f46 !important; color: white !important; }
        
        /* آؤٹ پٹ باکس کی سیٹنگ */
        #output { min-height: 150px; }
    </style>
</head>
<body class="py-10 px-4">

    <div class="max-w-2xl mx-auto premium-card p-6 md:p-8 rounded-[2rem]">
        <div class="flex justify-between items-center mb-8">
            <h1 class="text-2xl font-extrabold text-emerald-900">EmailRefiner <span class="text-emerald-600">Pro</span></h1>
            <select id="lang" class="p-2 border border-emerald-100 rounded-xl bg-emerald-50 text-emerald-800 font-semibold outline-none">
                <option value="en">English</option>
                <option value="hi">हिन्दी</option>
                <option value="de">Deutsch</option>
            </select>
        </div>

        <div class="grid grid-cols-2 gap-3 mb-6">
            <button onclick="setTone(this, 'Professional')" class="tone-btn active-btn p-3 rounded-xl border border-emerald-200 font-semibold transition-all">Professional</button>
            <button onclick="setTone(this, 'Friendly')" class="tone-btn p-3 rounded-xl border border-emerald-200 font-semibold hover:border-emerald-600 transition-all">Friendly</button>
            <button onclick="setTone(this, 'Formal')" class="tone-btn p-3 rounded-xl border border-emerald-200 font-semibold hover:border-emerald-600 transition-all">Formal</button>
            <button onclick="setTone(this, 'Concise')" class="tone-btn p-3 rounded-xl border border-emerald-200 font-semibold hover:border-emerald-600 transition-all">Concise</button>
        </div>

        <textarea id="input" class="w-full p-5 border-2 border-emerald-100 rounded-2xl mb-6 outline-none focus:ring-2 focus:ring-emerald-500 transition-all min-h-[150px]" placeholder="Paste your draft here..."></textarea>
        
        <button onclick="refine()" class="w-full emerald-btn py-4 rounded-2xl font-bold text-lg shadow-lg shadow-emerald-200 transition-all">Refine My Email</button>

        <div id="outputArea" class="hidden mt-8 border-t pt-6">
            <div id="output" class="w-full p-6 bg-slate-50 border-2 border-emerald-100 rounded-2xl text-slate-700 leading-relaxed whitespace-pre-wrap"></div>
            
            <button onclick="copy()" class="mt-4 w-full py-3 bg-emerald-50 text-emerald-700 font-bold rounded-xl hover:bg-emerald-100 transition-all">Copy to Clipboard</button>
        </div>
    </div>

    <script>
        let currentTone = 'Professional';
        function setTone(btn, tone) {
            document.querySelectorAll('.tone-btn').forEach(b => b.classList.remove('active-btn'));
            btn.classList.add('active-btn');
            currentTone = tone;
        }

        function refine() {
            const input = document.getElementById('input').value;
            if(!input) return alert("Please write something!");

            // نمونے کے لیے پروفیشنل ای میل (یہاں اصل AI انٹیگریشن آئے گی)
            const response = "Dear Team,\n\nI am writing to formally request a three-day leave of absence, starting from Monday. Due to an urgent family medical matter, my presence at home is currently required. \n\nI have ensured that all my tasks for the week are completed, so there are no outstanding deliverables. I have also made arrangements to stay reachable via phone for anything urgent.\n\nThank you for your understanding.\n\nBest Regards,\n[Your Name]";
            
            const out = document.getElementById('output');
            out.innerText = response;
            document.getElementById('outputArea').classList.remove('hidden');
        }

        function copy() {
            const text = document.getElementById('output').innerText;
            navigator.clipboard.writeText(text);
            alert("Copied to clipboard!");
        }
    </script>
</body>
</html>
