<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EmailRefiner Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700&display=swap');
        body { font-family: 'Inter', sans-serif; background: #f1f5f9; }
        .app-card { background: white; border: 1px solid #e2e8f0; box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.1); }
        .textarea-custom { min-height: 200px; width: 100%; border: 2px solid #e2e8f0; border-radius: 1rem; padding: 1.5rem; outline: none; transition: 0.3s; }
        .textarea-custom:focus { border-color: #4f46e5; box-shadow: 0 0 0 3px rgba(79, 70, 229, 0.1); }
        .tone-btn { padding: 1rem; border-radius: 0.75rem; border: 2px solid #e2e8f0; font-weight: 600; transition: 0.3s; }
        .active { background: #4f46e5 !important; color: white !important; border-color: #4f46e5 !important; }
    </style>
</head>
<body class="p-4 md:p-10">

<div class="max-w-4xl mx-auto app-card p-8 md:p-12 rounded-3xl">
    <!-- Header -->
    <div class="flex justify-between items-center mb-10 border-b pb-6">
        <h1 class="text-3xl font-bold text-slate-800">EmailRefiner <span class="text-indigo-600">Pro</span></h1>
        <select id="lang" class="bg-slate-100 p-3 rounded-xl border font-semibold outline-none cursor-pointer">
            <option value="en">English</option>
            <option value="hi">हिन्दी</option>
            <option value="de">Deutsch</option>
            <option value="fr">Français</option>
            <option value="zh">中文</option>
        </select>
    </div>

    <!-- Tones -->
    <div class="grid grid-cols-2 md:grid-cols-4 gap-4 mb-8">
        <button onclick="setTone(this, 'Professional')" class="tone-btn active">Professional</button>
        <button onclick="setTone(this, 'Friendly')" class="tone-btn">Friendly</button>
        <button onclick="setTone(this, 'Formal')" class="tone-btn">Formal</button>
        <button onclick="setTone(this, 'Concise')" class="tone-btn">Concise</button>
    </div>

    <!-- Input -->
    <textarea id="input" class="textarea-custom mb-6" placeholder="Paste your rough draft here, and let the AI craft a comprehensive professional email..."></textarea>
    
    <button onclick="refine()" class="w-full bg-indigo-600 text-white py-4 rounded-xl font-bold text-lg hover:bg-indigo-700 shadow-xl transition-all">Refine My Email</button>

    <!-- Output -->
    <div id="outputArea" class="hidden mt-10">
        <div class="flex justify-between items-center mb-4">
            <span class="font-bold text-slate-700 uppercase tracking-wider text-sm">Refined Output</span>
            <button onclick="copy()" class="text-indigo-600 font-semibold hover:underline">Copy to Clipboard</button>
        </div>
        <textarea id="output" readonly class="textarea-custom bg-slate-50 text-slate-800 leading-relaxed"></textarea>
    </div>
</div>

<script>
    let currentTone = 'Professional';
    function setTone(btn, tone) {
        document.querySelectorAll('.tone-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        currentTone = tone;
    }

    function refine() {
        const input = document.getElementById('input').value;
        if(!input) return alert("Please write something first!");

        // تفصیلی اور پروفیشنل جوابات
        const responses = {
            "Professional": "Dear Team,\n\nI trust this email finds you well. I am writing to provide a comprehensive update regarding our current project status. After thorough review, I am pleased to report that we have made significant progress across all key milestones. The quality of work produced thus far meets our highest standards, and I am confident that our current momentum will ensure a successful project completion.\n\nI appreciate your continued dedication and look forward to discussing the next steps in our upcoming session.\n\nBest Regards,\n[Your Name]\n[Your Designation]",
            "Friendly": "Hi everyone,\n\nI hope you're all having a great week! I wanted to reach out and share an exciting update on where we stand with our project. The team has really stepped up, and I’m incredibly happy with the progress we’ve made so far. It’s been a pleasure seeing everything come together so smoothly.\n\nLet’s keep up the great work, and please feel free to reach out if you have any questions or ideas.\n\nWarm regards,\n[Your Name]",
            "Formal": "To Whom It May Concern,\n\nPlease accept this formal correspondence as a status update regarding the project under development. We have completed the initial phases as projected and are now moving forward with the subsequent stages of our implementation plan. All objectives remain aligned with our established timeline.\n\nShould you require further information or detailed documentation, please do not hesitate to reach out.\n\nRespectfully,\n[Your Name]",
            "Concise": "Team,\n\nQuick update: The project is progressing well and remains on schedule for our target deadline. All key deliverables are currently in the final review stages.\n\nBest,\n[Your Name]"
        };

        const out = document.getElementById('output');
        out.value = responses[currentTone];
        document.getElementById('outputArea').classList.remove('hidden');
        // خود بخود باکس کو ایڈجسٹ کرنا
        out.style.height = "auto";
        out.style.height = (out.scrollHeight) + "px";
    }

    function copy() {
        const text = document.getElementById('output');
        text.select();
        document.execCommand('copy');
        alert("Copied to your clipboard!");
    }
</script>
</body>
</html>
