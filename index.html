<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Email Refiner Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-50 text-slate-800 min-h-screen">
    <div class="max-w-xl mx-auto p-4">
        <!-- Header -->
        <header class="flex justify-between items-center mb-8">
            <div class="flex items-center gap-2">
                <div class="bg-green-600 text-white p-2 rounded-lg">✉️</div>
                <div>
                    <h1 class="text-xl font-bold text-slate-800">Email Refiner Pro</h1>
                    <p class="text-xs text-slate-500">Instant professional email polish</p>
                </div>
            </div>
            <span class="bg-green-100 text-green-800 px-3 py-1 rounded-full text-xs font-semibold">✨ Instant & Free</span>
        </header>

        <!-- Main Title -->
        <h2 class="text-4xl font-extrabold mb-4 leading-tight">Turn Rough Drafts into <span class="text-green-600">Professional Emails</span></h2>
        <p class="text-slate-600 mb-6 italic">اپنی سادہ ای میل یہاں لکھیں، ہم اسے پروفیشنل بنا دیں گے — Write your rough email and let AI transform it instantly.</p>
        
        <!-- Tone Selection -->
        <div class="bg-white p-5 rounded-2xl shadow-sm border border-slate-200 mb-6">
            <h3 class="font-bold mb-4 text-slate-700">Choose Tone</h3>
            <div class="grid grid-cols-2 gap-3">
                <button class="p-4 rounded-xl border-2 border-green-500 bg-green-50 text-right">
                    <div class="font-bold text-green-700">Professional</div>
                    <div class="text-[10px] text-green-600">Polished business tone</div>
                </button>
                <button class="p-4 rounded-xl border border-slate-200 text-right">
                    <div class="font-bold text-slate-700">Friendly</div>
                    <div class="text-[10px] text-slate-500">Warm yet professional</div>
                </button>
                <button class="p-4 rounded-xl border border-slate-200 text-right">
                    <div class="font-bold text-slate-700">Formal</div>
                    <div class="text-[10px] text-slate-500">Strict business letter</div>
                </button>
                <button class="p-4 rounded-xl border border-slate-200 text-right">
                    <div class="font-bold text-slate-700">Concise</div>
                    <div class="text-[10px] text-slate-500">Short and direct</div>
                </button>
            </div>
        </div>

        <textarea id="emailInput" class="w-full h-40 p-4 rounded-xl border border-slate-300 mb-4" placeholder="e.g. hey boss i cant come today im sick..."></textarea>
        <button class="w-full bg-green-600 text-white py-4 rounded-xl font-bold text-lg hover:bg-green-700 transition">Refine My Email</button>
    </div>
</body>
</html>
