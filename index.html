<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/png" href="ms-icon-150x150.png">
    <link rel="apple-touch-icon" href="ms-icon-150x150.png">
    <title>Email Refiner — Master Your Professional Email Communication</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style> 
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght=300;400;700;800&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #f8fafc; }
        .premium-card { background: #ffffff; border: 1px solid #e2e8f0; box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.05); }
        .emerald-btn { background-color: #059669; color: white; }
        .emerald-btn:hover { background-color: #047857; }
        .active-btn { background-color: #065f46 !important; color: white !important; }
        #toast { visibility: hidden; min-width: 200px; background-color: #333; color: #fff; text-align: center; border-radius: 50px; padding: 12px; position: fixed; z-index: 1; bottom: 30px; left: 50%; transform: translateX(-50%); font-size: 14px; }
        #toast.show { visibility: visible; animation: fadein 0.5s, fadeout 0.5s 2s; }
        @keyframes fadein { from {bottom: 0; opacity: 0;} to {bottom: 30px; opacity: 1;} }
        @keyframes fadeout { from {bottom: 30px; opacity: 1;} to {bottom: 0; opacity: 0;} }
        .star { cursor: pointer; color: #cbd5e1; transition: color 0.2s; font-size: 24px; }
        .star.filled { color: #f59e0b; }
    </style>
</head>
<body class="py-6 px-4 md:pb-20">
    <div id="toast">Copied to clipboard!</div>
    
    <div class="max-w-4xl mx-auto premium-card p-5 md:p-8 rounded-[2rem] relative">
        <div id="emailSection">
            <textarea id="input" class="w-full p-4 border-2 border-emerald-100 rounded-2xl mb-5 outline-none focus:ring-2 focus:ring-emerald-500 min-h-[140px] text-sm md:text-base" placeholder="Paste your draft email here..."></textarea>
            
            <button id="refineBtn" onclick="refine()" class="w-full emerald-btn py-4 rounded-2xl font-bold text-lg shadow-lg shadow-emerald-200 transition-all mb-6">Refine My Email</button>

            <div id="ratingSection" class="w-full bg-sky-50 p-4 rounded-2xl border border-sky-100 shadow-sm flex items-center justify-between mb-6">
                <span class="text-xs font-black text-sky-900 tracking-wider">RATE US:</span>
                <div id="star-container" class="flex gap-1">
                    <span class="star" onclick="rate(1)">★</span>
                    <span class="star" onclick="rate(2)">★</span>
                    <span class="star" onclick="rate(3)">★</span>
                    <span class="star" onclick="rate(4)">★</span>
                    <span class="star" onclick="rate(5)">★</span>
                </div>
            </div>

            <div id="outputArea" class="hidden mt-6 border-t pt-6">
                <div id="output" class="w-full p-6 bg-slate-50 border-2 border-emerald-200 rounded-2xl text-slate-700 leading-relaxed whitespace-pre-wrap"></div>
                <button onclick="copy('output')" class="mt-4 w-full py-3 bg-emerald-50 text-emerald-700 font-bold rounded-xl hover:bg-emerald-100 transition-all">Copy to Clipboard</button>
            </div>
        </div>
        </div>

    <script>
        // آپ کا اصلی فنکشن جو ریفائن کرتا ہے
        async function refine() {
            const inputField = document.getElementById('input');
            const input = inputField.value.trim();
            const btn = document.getElementById('refineBtn');
            const outputArea = document.getElementById('outputArea');
            const outputBox = document.getElementById('output');
            
            if(!input) return;

            btn.innerText = "Processing...";
            btn.disabled = true;

            try {
                const response = await fetch("/api/refine", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ prompt: input, tone: currentTone })
                });
                const data = await response.json();
                if (data.refinedEmail) {
                    outputBox.innerText = data.refinedEmail;
                    outputArea.classList.remove('hidden');
                } else {
                    alert("Error: " + (data.error || "Could not get a response."));
                }
            } catch (error) {
                alert("Connection error. Please try again.");
            } finally {
                btn.innerText = "Refine My Email";
                btn.disabled = false;
            }
        }
        // ... (باقی تمام فنکشنز سیم ہیں)
    </script>
</body>
</html>
