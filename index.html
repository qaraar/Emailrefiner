<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Email Refiner</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-50 p-6">
    <div class="max-w-md mx-auto bg-white p-6 rounded-2xl shadow-lg">
        <h1 class="text-2xl font-bold mb-4">Email Refiner</h1>
        
        <div class="grid grid-cols-2 gap-2 mb-4">
            <button onclick="setTone('Professional')" class="border p-2 rounded-lg hover:bg-blue-100">Professional</button>
            <button onclick="setTone('Friendly')" class="border p-2 rounded-lg hover:bg-blue-100">Friendly</button>
            <button onclick="setTone('Formal')" class="border p-2 rounded-lg hover:bg-blue-100">Formal</button>
            <button onclick="setTone('Concise')" class="border p-2 rounded-lg hover:bg-blue-100">Concise</button>
        </div>

        <textarea id="input" class="w-full h-32 p-3 border rounded-lg mb-4" placeholder="Type your rough email..."></textarea>
        <button onclick="refineEmail()" class="w-full bg-green-600 text-white py-3 rounded-lg font-bold">Refine My Email</button>
        
        <div id="outputContainer" class="hidden mt-4">
            <div id="output" class="p-3 bg-slate-100 rounded-lg whitespace-pre-line mb-2"></div>
            <button onclick="copyToClipboard()" class="w-full bg-slate-800 text-white py-2 rounded-lg">Copy Email</button>
        </div>
    </div>

    <script>
        let selectedTone = "Professional";

        function setTone(tone) {
            selectedTone = tone;
            alert("Tone set to: " + tone);
        }

        function refineEmail() {
            const text = document.getElementById('input').value;
            if(!text) return alert("Please type something!");

            let refined = "";
            // یہ ایک سادہ طریقہ ہے، کوئی AI کال نہیں ہو رہی
            if(selectedTone === "Professional") refined = "Dear Team,\n\nI am writing to inform you that " + text + ".\n\nBest regards,\n[Your Name]";
            else if(selectedTone === "Friendly") refined = "Hi there!\n\nJust wanted to let you know that " + text + ".\n\nCheers,\n[Your Name]";
            else if(selectedTone === "Formal") refined = "To Whom It May Concern,\n\nThis is to formally state that " + text + ".\n\nSincerely,\n[Your Name]";
            else refined = "Hello,\n\nJust updating you: " + text + ".\n\nThanks,\n[Your Name]";

            document.getElementById('output').innerText = refined;
            document.getElementById('outputContainer').classList.remove('hidden');
        }

        function copyToClipboard() {
            const text = document.getElementById('output').innerText;
            navigator.clipboard.writeText(text);
            alert("Copied!");
        }
    </script>
</body>
</html>
