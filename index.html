<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Email Refiner — The Ultimate AI Writing Assistant</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style> 
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #f0fdf4; }
        .glass-card { background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(10px); border: 1px solid #d1fae5; }
        .active-btn { background-color: #065f46 !important; color: white !important; }
        .tone-btn { white-space: nowrap; overflow: hidden; text-overflow: ellipsis; font-size: 11px !important; }
    </style>
</head>
<body class="min-h-screen py-6 px-4">

    <!-- نیویگیشن بار -->
    <nav class="max-w-4xl mx-auto bg-white/80 backdrop-blur-md p-4 rounded-3xl shadow-sm mb-8 flex flex-wrap justify-center items-center gap-4 border border-emerald-100">
        <a href="index.html" class="font-bold">Home</a>
        <a href="about.html">About</a>
        <a href="mailto:zaara1970@gmail.com">Contact</a>
        <a href="disclaimer.html">Disclaimer</a>
        <a href="privacy.html">Privacy</a>
        <button id="installBtn" class="bg-emerald-900 text-white px-5 py-2 rounded-full font-bold text-xs">Install App</button>
    </nav>

    <main class="max-w-2xl mx-auto glass-card p-8 rounded-[3rem] shadow-2xl">
        <h1 id="title" class="text-3xl font-extrabold text-center text-emerald-950 mb-6">Email Refiner</h1>

        <select id="langSelect" onchange="translateUI()" class="w-full mb-6 p-3 rounded-2xl border-2 border-emerald-100 font-bold text-emerald-800 outline-none">
            <option value="English">English</option>
            <option value="Urdu">Urdu (اردو)</option>
            <option value="Spanish">Spanish (Español)</option>
            <option value="French">French (Français)</option>
        </select>

        <div class="grid grid-cols-3 gap-2 mb-6">
            <button onclick="setTone(this, 'Professional')" class="tone-btn active-btn p-3 rounded-xl border font-bold">Professional</button>
            <button onclick="setTone(this, 'Friendly')" class="tone-btn p-3 rounded-xl border font-bold">Friendly</button>
            <button onclick="setTone(this, 'Formal')" class="tone-btn p-3 rounded-xl border font-bold">Formal</button>
            <button onclick="setTone(this, 'Concise')" class="tone-btn p-3 rounded-xl border font-bold">Concise</button>
            <button onclick="setTone(this, 'Creative')" class="tone-btn p-3 rounded-xl border font-bold">Creative</button>
            <button onclick="setTone(this, 'Persuasive')" class="tone-btn p-3 rounded-xl border font-bold">Persuasive</button>
        </div>

        <textarea id="input" class="w-full h-40 p-5 border-2 border-emerald-100 rounded-3xl mb-4 outline-none" placeholder="Paste your draft email here..."></textarea>
        
        <div class="mb-6 text-center">
            <label class="block bg-emerald-50 py-3 rounded-2xl border-2 border-dashed border-emerald-300 text-emerald-700 font-bold cursor-pointer">
                📷 Capture or Upload
                <input type="file" id="camInput" accept="image/*" class="hidden" onchange="showImage(this)">
            </label>
            <p id="uploadStatus" class="text-xs text-emerald-600 mt-2 hidden">Image uploaded successfully!</p>
        </div>
        
        <button id="refineBtn" onclick="refine()" class="w-full bg-emerald-600 text-white py-4 rounded-2xl font-bold text-lg">Refine My Email</button>

        <div id="outputArea" class="hidden mt-8 border-t pt-6">
            <div id="output" class="w-full p-6 bg-slate-50 border-2 border-emerald-100 rounded-2xl whitespace-pre-wrap"></div>
        </div>
    </main>

    <script>
        function showImage(input) {
            if (input.files && input.files[0]) {
                document.getElementById('uploadStatus').classList.remove('hidden');
                // یہاں آپ OCR لاجک شامل کر سکتے ہیں
            }
        }

        function translateUI() {
            const lang = document.getElementById('langSelect').value;
            if (lang === 'Urdu') {
                document.getElementById('title').innerText = "ای میل ریفائنر";
                document.getElementById('refineBtn').innerText = "ای میل کو بہتر بنائیں";
            } else {
                document.getElementById('title').innerText = "Email Refiner";
                document.getElementById('refineBtn').innerText = "Refine My Email";
            }
        }

        // باقی لاجک (Refine, Tone, Copy) بالکل پہلے جیسی محفوظ ہے
        let currentTone = 'Professional';
        function setTone(btn, tone) {
            document.querySelectorAll('.tone-btn').forEach(b => b.classList.remove('active-btn'));
            btn.classList.add('active-btn');
            currentTone = tone;
        }

        async function refine() {
            const input = document.getElementById('input').value;
            const lang = document.getElementById('langSelect').value;
            const btn = document.getElementById('refineBtn');
            btn.innerText = "Processing...";
            
            const response = await fetch("/api/refine", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ prompt: input, tone: currentTone, language: lang })
            });
            const data = await response.json();
            document.getElementById('output').innerText = data.refinedEmail;
            document.getElementById('outputArea').classList.remove('hidden');
            btn.innerText = "Refine My Email";
        }
    </script> 
</body>
</html>
