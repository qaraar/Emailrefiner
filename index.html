<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Email Refiner</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-50 p-6">
    <div class="max-w-md mx-auto bg-white p-6 rounded-2xl shadow-lg">
        <h1 class="text-2xl font-bold mb-4">Email Refiner</h1>
        <textarea id="input" class="w-full h-32 p-3 border rounded-lg mb-4" placeholder="Paste your rough email..."></textarea>
        <button onclick="refineEmail()" class="w-full bg-blue-600 text-white py-3 rounded-lg font-bold">Refine</button>
        <div id="output" class="mt-4 p-3 bg-slate-100 rounded-lg min-h-[50px]"></div>
    </div>

    <script>
        async function refineEmail() {
            // اپنی API Key یہاں پیسٹ کریں
            const API_KEY = "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"; 
            const text = document.getElementById('input').value;
            const output = document.getElementById('output');

            output.innerText = "Processing...";
            try {
                const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${API_KEY}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ contents: [{ parts: [{ text: "Rewrite this email professionally: " + text }] }] })
                });
                const data = await response.json();
                output.innerText = data.candidates[0].content.parts[0].text;
            } catch (e) {
                output.innerText = "Error: Check API Key or Internet.";
            }
        }
    </script>
</body>
</html>
