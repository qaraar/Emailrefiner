<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Email Refiner — AI Pro Assistant</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src='https://unpkg.com/tesseract.js@v2.1.0/dist/tesseract.min.js'></script>
    <style> 
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #f0fdf4; }
        .glass-card { background: rgba(255, 255, 255, 0.9); border: 1px solid #d1fae5; }
        .active-btn { background-color: #065f46 !important; color: white !important; }
        #preview { max-width: 100%; height: auto; margin-top: 10px; border-radius: 15px; display: none; }
    </style>
</head>
<body class="min-h-screen py-6 px-4">

    <!-- نیویگیشن -->
    <nav class="max-w-4xl mx-auto bg-white p-4 rounded-3xl shadow-sm mb-6 flex flex-wrap justify-center items-center gap-4 border border-emerald-100">
        <a href="index.html" class="font-bold text-emerald-700">Home</a>
        <a href="about.html">About</a>
        <a href="mailto:zaara1970@gmail.com">Contact</a>
        <a href="disclaimer.html">Disclaimer</a>
        <a href="privacy.html">Privacy</a>
        <button id="installBtn" class="bg-emerald-900 text-white px-4 py-2 rounded-full font-bold text-xs">Install App</button>
    </nav>

    <!-- زبانیں (Google Translate) -->
    <div class="max-w-4xl mx-auto mb-4 text-center">
        <div id="google_translate_element"></div>
    </div>

    <main class="max-w-2xl mx-auto glass-card p-8 rounded-[3rem] shadow-2xl">
        <h1 class="text-3xl font-extrabold text-center text-emerald-950 mb-6">Email Refiner</h1>

        <!-- امیج پریویو باکس -->
        <div id="imageBox" class="mb-4 text-center hidden">
            <img id="preview" src="#" alt="Selected Image">
        </div>

        <textarea id="input" class="w-full h-40 p-5 border-2 border-emerald-100 rounded-3xl mb-4 outline-none" placeholder="Paste draft or upload a photo of your email..."></textarea>
        
        <div class="mb-6">
            <label class="block bg-emerald-50 py-4 rounded-2xl border-2 border-dashed border-emerald-300 text-emerald-700 font-bold cursor-pointer text-center">
                📷 Upload Photo to Refine
                <input type="file" id="imageInput" accept="image/*" class="hidden" onchange="previewAndProcess(this)">
            </label>
        </div>
        
        <button id="refineBtn" onclick="refine()" class="w-full bg-emerald-600 text-white py-4 rounded-2xl font-bold text-lg">Refine My Email</button>

        <div id="outputArea" class="hidden mt-8 border-t pt-6">
            <div id="output" class="w-full p-6 bg-slate-50 border-2 border-emerald-100 rounded-2xl whitespace-pre-wrap"></div>
        </div>
    </main>

    <script type="text/javascript">
        function googleTranslateElementInit() {
            new google.translate.TranslateElement({pageLanguage: 'en', includedLanguages: 'en,es,fr,de,ur,ar,hi,zh,ja,ru,pt,it,ko,tr,nl'}, 'google_translate_element');
        }
    </script>
    <script type="text/javascript" src="//translate.google.com/translate_a/element.js?cb=googleTranslateElementInit"></script>

    <script>
        // امیج پروسیسنگ اور OCR
        async function previewAndProcess(input) {
            if (input.files && input.files[0]) {
                const reader = new FileReader();
                reader.onload = function(e) {
                    document.getElementById('preview').src = e.target.result;
                    document.getElementById('preview').style.display = 'block';
                    document.getElementById('imageBox').classList.remove('hidden');
                }
                reader.readAsDataURL(input.files[0]);

                // OCR عمل
                const btn = document.getElementById('refineBtn');
                btn.innerText = "Extracting Text...";
                const { data: { text } } = await Tesseract.recognize(input.files[0], 'eng');
                document.getElementById('input').value = text;
                btn.innerText = "Refine My Email";
            }
        }

        // آپ کا اصل ریفائن فنکشن (کوئی تبدیلی نہیں کی)
        async function refine() {
            const input = document.getElementById('input').value;
            const btn = document.getElementById('refineBtn');
            btn.innerText = "Processing...";
            
            const response = await fetch("/api/refine", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ prompt: input })
            });
            const data = await response.json();
            document.getElementById('output').innerText = data.refinedEmail;
            document.getElementById('outputArea').classList.remove('hidden');
            btn.innerText = "Refine My Email";
        }
    </script>
</body>
</html>
