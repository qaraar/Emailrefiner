<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EmailCraft | Professional AI Refiner</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; }
        .gradient-bg { background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%); }
        .glass { background: rgba(255, 255, 255, 0.95); backdrop-filter: blur(10px); }
        .active-btn { background-color: #059669 !important; color: white !important; border-color: #059669 !important; }
    </style>
</head>
<body class="bg-slate-100 min-h-screen py-10">

    <div class="max-w-2xl mx-auto glass p-8 rounded-3xl shadow-2xl border border-slate-200">
        <div class="flex items-center gap-4 mb-8">
            <div class="w-12 h-12 bg-emerald-600 rounded-2xl flex items-center justify-center text-white font-bold text-xl shadow-lg shadow-emerald-200">EC</div>
            <div>
                <h1 class="text-2xl font-bold text-slate-900">EmailCraft</h1>
                <p class="text-slate-500 text-sm">Professional Communication, Perfected.</p>
            </div>
            <select id="langSelector" onchange="updateUI()" class="ml-auto p-2 text-sm border rounded-lg outline-none">
                <option value="en">English</option>
                <option value="ur">اردو</option>
            </select>
        </div>

        <div class="grid grid-cols-2 md:grid-cols-4 gap-3 mb-6">
            <button onclick="setTone(this, 'Professional')" class="tone-btn active-btn p-3 rounded-xl border border-slate-200 font-semibold text-sm transition-all hover:border-emerald-600">Professional</button>
            <button onclick="setTone(this, 'Friendly')" class="tone-btn p-3 rounded-xl border border-slate-200 font-semibold text-sm transition-all hover:border-emerald-600">Friendly</button>
            <button onclick="setTone(this, 'Formal')" class="tone-btn p-3 rounded-xl border border-slate-200 font-semibold text-sm transition-all hover:border-emerald-600">Formal</button>
            <button onclick="setTone(this, 'Concise')" class="tone-btn p-3 rounded-xl border border-slate-200 font-semibold text-sm transition-all hover:border-emerald-600">Concise</button>
        </div>

        <textarea id="input" class="w-full h-48 p-5 bg-slate-50 border border-slate-200 rounded-2xl mb-6 outline-none focus:ring-4 focus:ring-emerald-100 transition-all" placeholder="Paste your rough draft here..."></textarea>
        
        <button onclick="refineEmail()" class="w-full bg-emerald-600 text-white py-4 rounded-2xl font-bold text-lg hover:bg-emerald-700 shadow-xl shadow-emerald-200 transition-all">Refine My Email</button>

        <div id="outputContainer" class="hidden mt-8 border-t pt-8">
            <h3 class="text-slate-400 text-xs uppercase tracking-widest font-bold mb-3">Refined Version</h3>
            <div id="output" class="w-full h-48 p-6 bg-slate-900 text-emerald-400 rounded-2xl font-mono text-sm overflow-y-auto shadow-inner"></div>
            <button onclick="copyToClipboard()" class="mt-4 w-full py-3 bg-slate-100 text-slate-600 font-semibold rounded-xl hover:bg-slate-200">Copy to Clipboard</button>
        </div>
    </div>

    <script>
        let selectedTone = 'Professional';
        
        function setTone(btn, tone) {
            document.querySelectorAll('.tone-btn').forEach(b => b.classList.remove('active-btn'));
            btn.classList.add('active-btn');
            selectedTone = tone;
        }

        function refineEmail() {
            const input = document.getElementById('input').value;
            if(!input) return alert("Please enter some text!");
            
            const results = {
                "Professional": "Dear Team,\n\nI am writing to provide a formal update regarding the current project. We are making excellent progress and anticipate meeting our deadlines effectively.\n\nBest Regards,\n[Name]",
                "Friendly": "Hi everyone! Hope you're all doing well. Just wanted to let you know that things are moving along great with the project. Thanks for all your hard work!\n\nBest,\n[Name]",
                "Formal": "To whom it may concern,\n\nPlease accept this correspondence as an update regarding the project status. We remain on schedule.\n\nSincerely,\n[Name]",
                "Concise": "Team,\n\nQuick update: The project is on track and moving forward as planned.\n\nBest,\n[Name]"
            };

            document.getElementById('output').innerText = results[selectedTone];
            document.getElementById('outputContainer').classList.remove('hidden');
        }

        function copyToClipboard() {
            const text = document.getElementById('output').innerText;
            navigator.clipboard.writeText(text);
        }
    </script>
</body>
</html>
