<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <title>Email Refiner — Master Your Professional Email Communication</title>
    <meta name="description" content="Struggling with email drafting? Use Email Refiner to instantly polish your tone, fix clarity, and master your professional email communication with AI-powered precision.">
    <meta name="keywords" content="Email Refiner, AI Email Assistant, Professional Email Writing, Business Communication, Polish Email Tone">
    
    <script src="https://cdn.tailwindcss.com"></script>
    <style> 
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght=300;400;700;800&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #f8fafc; }
        .premium-card { background: #ffffff; border: 1px solid #e2e8f0; box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.05); }
        .emerald-btn { background-color: #059669; color: white; }
        .emerald-btn:hover { background-color: #047857; }
        .active-btn { background-color: #065f46 !important; color: white !important; }
        #toast { visibility: hidden; min-width: 200px; background-color: #333; color: #fff; text-align: center; border-radius: 50px; padding: 12px; position: fixed; z-index: 1; bottom: 30px; left: 50%; transform: translateX(-50%); font-size: 14px; }
        #toast.show { visibility: visible; animation: fadein 0.5s, fadeout 0.5s 2s; }
        @keyframes fadein { from {bottom: 0; opacity: 0;} to {bottom: 30px; opacity: 1;} }
        @keyframes fadeout { from {bottom: 30px; opacity: 1;} to {bottom: 0; opacity: 0;} }
    </style>
</head>
<body class="py-10 px-4">

    <div id="toast">Copied to clipboard!</div>

    <div class="max-w-4xl mx-auto premium-card p-6 md:p-8 rounded-[2rem] relative">
        
        <div class="flex justify-between items-center mb-6 border-b pb-4 border-slate-100">
            <button id="backToHomeBtn" onclick="showSection('emailSection')" class="hidden py-2 px-4 bg-slate-100 text-slate-700 font-semibold rounded-xl hover:bg-slate-200 transition-all text-sm">← Back to Email Refiner</button>
            <div class="flex-grow"></div>
            <button id="goTranslatorBtn" onclick="showSection('translatorSection')" class="py-2 px-4 bg-emerald-50 text-emerald-700 font-bold rounded-xl hover:bg-emerald-100 transition-all text-sm border border-emerald-200">Language Translator →</button>
        </div>

        <div id="emailSection">
            <div class="text-center mb-8">
                <h1 class="text-4xl font-extrabold text-emerald-950 tracking-tighter">Email Refiner</h1>
                <p class="text-emerald-700 mt-2 font-medium italic">Master Your Professional Email Communication</p>
            </div>

            <div class="grid grid-cols-2 md:grid-cols-4 gap-3 mb-6">
                <button onclick="setTone(this, 'Professional')" class="tone-btn active-btn p-3 rounded-xl border border-emerald-200 font-semibold transition-all">Professional</button>
                <button onclick="setTone(this, 'Friendly')" class="tone-btn p-3 rounded-xl border border-emerald-200 font-semibold hover:border-emerald-600 transition-all">Friendly</button>
                <button onclick="setTone(this, 'Formal')" class="tone-btn p-3 rounded-xl border border-emerald-200 font-semibold hover:border-emerald-600 transition-all">Formal</button>
                <button onclick="setTone(this, 'Concise')" class="tone-btn p-3 rounded-xl border border-emerald-200 font-semibold hover:border-emerald-600 transition-all">Concise</button>
            </div>

            <textarea id="input" class="w-full p-5 border-2 border-emerald-100 rounded-2xl mb-6 outline-none focus:ring-2 focus:ring-emerald-500 min-h-[150px]" placeholder="Paste your draft email here..."></textarea>
            
            <button id="refineBtn" onclick="refine()" class="w-full emerald-btn py-4 rounded-2xl font-bold text-lg shadow-lg shadow-emerald-200 transition-all">Refine My Email</button>

            <div id="outputArea" class="hidden mt-8 border-t pt-6">
                <div id="output" class="w-full p-6 bg-slate-50 border-2 border-emerald-100 rounded-2xl text-slate-700 leading-relaxed whitespace-pre-wrap"></div>
                <button onclick="copy('output')" class="mt-4 w-full py-3 bg-emerald-50 text-emerald-700 font-bold rounded-xl hover:bg-emerald-100 transition-all">Copy to Clipboard</button>
            </div>
        </div>

        <div id="translatorSection" class="hidden">
            <div class="text-center mb-8">
                <h1 class="text-4xl font-extrabold text-emerald-950 tracking-tighter">Language Translator</h1>
                <p class="text-emerald-700 mt-2 font-medium italic">Instant Multi-Language Translation powered by Groq</p>
            </div>

            <div class="flex flex-col sm:flex-row items-center justify-between gap-4 mb-6 bg-slate-50 p-4 rounded-2xl border border-slate-100">
                <div class="w-full sm:w-auto flex flex-col gap-1">
                    <label class="text-xs font-bold text-emerald-800 px-1">From:</label>
                    <select id="sourceLang" class="w-full sm:w-64 p-3 bg-white border-2 border-emerald-100 rounded-xl outline-none focus:ring-2 focus:ring-emerald-500 font-semibold text-slate-700">
                        <option value="English" selected>English (انگلش)</option>
                        <option value="Urdu">Urdu (اردو)</option>
                        <option value="Arabic">Arabic (عربی)</option>
                        <option value="Punjabi">Punjabi (پنجابی)</option>
                        <option value="Pashto">Pashto (پشتو)</option>
                        <option value="Sindhi">Sindhi (سندھی)</option>
                        <option value="Hindi">Hindi (ہندی)</option>
                        <option value="Spanish">Spanish (اسپینش)</option>
                        <option value="French">French (فرانسیسی)</option>
                        <option value="German">German (جرمن)</option>
                        <option value="Chinese">Chinese (چینی)</option>
                        <option value="Russian">Russian (روسی)</option>
                        <option value="Turkish">Turkish (ترکی)</option>
                        <option value="Persian">Persian (فارسی)</option>
                        <option value="Bengali">Bengali (بنگالی)</option>
                    </select>
                </div>

                <button onclick="toggleLanguages()" class="mt-4 sm:mt-5 p-3 bg-white border-2 border-emerald-100 rounded-full font-bold text-emerald-700 hover:bg-emerald-50 transition-all shadow-sm active:scale-95">
                    ⇄
                </button>

                <div class="w-full sm:w-auto flex flex-col gap-1">
                    <label class="text-xs font-bold text-emerald-800 px-1">To:</label>
                    <select id="targetLang" class="w-full sm:w-64 p-3 bg-white border-2 border-emerald-100 rounded-xl outline-none focus:ring-2 focus:ring-emerald-500 font-semibold text-slate-700">
                        <option value="English">English (انگلش)</option>
                        <option value="Urdu" selected>Urdu (اردو)</option>
                        <option value="Arabic">Arabic (عربی)</option>
                        <option value="Punjabi">Punjabi (پنجابی)</option>
                        <option value="Pashto">Pashto (پشتو)</option>
                        <option value="Sindhi">Sindhi (سندھی)</option>
                        <option value="Hindi">Hindi (ہندی)</option>
                        <option value="Spanish">Spanish (اسپینش)</option>
                        <option value="French">French (فرانسیسی)</option>
                        <option value="German">German (جرمن)</option>
                        <option value="Chinese">Chinese (چینی)</option>
                        <option value="Russian">Russian (روسی)</option>
                        <option value="Turkish">Turkish (ترکی)</option>
                        <option value="Persian">Persian (فارسی)</option>
                        <option value="Bengali">Bengali (بنگالی)</option>
                    </select>
                </div>
            </div>

            <div class="grid grid-cols-1 md:grid-cols-2 gap-6 mb-6">
                <div>
                    <label class="block text-sm font-bold text-slate-600 mb-2">Source Text (پیسٹ کریں)</label>
                    <textarea id="translateInput" class="w-full p-5 border-2 border-emerald-100 rounded-2xl outline-none focus:ring-2 focus:ring-emerald-500 min-h-[180px]" placeholder="Paste your text here to translate..."></textarea>
                </div>
                <div>
                    <label class="block text-sm font-bold text-slate-600 mb-2">Translation Output (ترجمہ)</label>
                    <div id="translateOutput" class="w-full p-5 bg-slate-50 border-2 border-emerald-100 rounded-2xl text-slate-700 min-h-[180px] whitespace-pre-wrap leading-relaxed"></div>
                </div>
            </div>

            <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
                <button id="translateBtn" onclick="translateText()" class="w-full emerald-btn py-4 rounded-2xl font-bold text-lg shadow-lg shadow-emerald-200 transition-all">Translate Now</button>
                <button onclick="copy('translateOutput')" class="w-full py-4 bg-emerald-50 text-emerald-700 font-bold rounded-2xl hover:bg-emerald-100 transition-all border border-emerald-200">Copy Translation</button>
            </div>
        </div>

    </div>

    <script>
        let currentTone = 'Professional';

        function showSection(sectionId) {
            if (sectionId === 'translatorSection') {
                document.getElementById('emailSection').classList.add('hidden');
                document.getElementById('translatorSection').classList.remove('hidden');
                document.getElementById('goTranslatorBtn').classList.add('hidden');
                document.getElementById('backToHomeBtn').classList.remove('hidden');
            } else {
                document.getElementById('translatorSection').classList.add('hidden');
                document.getElementById('emailSection').classList.remove('hidden');
                document.getElementById('backToHomeBtn').classList.add('hidden');
                document.getElementById('goTranslatorBtn').classList.remove('hidden');
            }
        }

        function setTone(btn, tone) {
            document.querySelectorAll('.tone-btn').forEach(b => b.classList.remove('active-btn'));
            btn.classList.add('active-btn');
            currentTone = tone;
        }

        async function refine() {
            const inputField = document.getElementById('input');
            const input = inputField.value.trim();
            const btn = document.getElementById('refineBtn');
            const outputArea = document.getElementById('outputArea');
            const outputBox = document.getElementById('output');
            
            if(!input) return;

            btn.innerText = "Processing...";
            btn.disabled = true;

            try {
                const response = await fetch("/api/refine", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ prompt: input, tone: currentTone })
                });
                const data = await response.json();
                if (data.refinedEmail) {
                    outputBox.innerText = data.refinedEmail;
                    outputArea.classList.remove('hidden');
                } else {
                    alert("Error: " + (data.error || "Could not get a response."));
                }
            } catch (error) {
                alert("Connection error. Please try again.");
            } finally {
                btn.innerText = "Refine My Email";
                btn.disabled = false;
            }
        }

        async function translateText() {
            const inputField = document.getElementById('translateInput');
            const input = inputField.value.trim();
            const sourceLang = document.getElementById('sourceLang').value;
            const targetLang = document.getElementById('targetLang').value;
            const btn = document.getElementById('translateBtn');
            const outputBox = document.getElementById('translateOutput');

            if (!input) return;

            btn.innerText = "Translating...";
            btn.disabled = true;
            outputBox.innerText = "";

            try {
                const response = await fetch("/api/translate", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ prompt: input, sourceLang: sourceLang, targetLang: targetLang })
                });

                const data = await response.json();
                if (data.translatedText) {
                    outputBox.innerText = data.translatedText;
                } else {
                    alert("Error: " + (data.error || "Translation failed. Please check worker configuration."));
                }
            } catch (error) {
                alert("Connection error. Please try again.");
                console.error(error);
            } finally {
                btn.innerText = "Translate Now";
                btn.disabled = false;
            }
        }

        function toggleLanguages() {
            const source = document.getElementById('sourceLang');
            const target = document.getElementById('targetLang');
            const temp = source.value;
            source.value = target.value;
            target.value = temp;
        }

        function copy(elementId) {
            const text = document.getElementById(elementId).innerText || document.getElementById(elementId).value;
            if(!text) return;
            navigator.clipboard.writeText(text);
            var x = document.getElementById("toast");
            x.className = "show";
            setTimeout(function(){ x.className = x.className.replace("show", ""); }, 3000);
        }
    </script> 
</body>
</html>
