<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/png" href="ms-icon-150x150.png">
    <link rel="apple-touch-icon" href="ms-icon-150x150.png">
    <link rel="manifest" href="manifest.json">
    <title>Email Refiner — Master Your Professional Email Communication</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style> 
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght=300;400;700;800&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #f8fafc; }
        .premium-card { background: #ffffff; border: 1px solid #e2e8f0; box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.05); }
        .emerald-btn { background-color: #059669; color: white; }
        .emerald-btn:hover { background-color: #047857; }
        .active-btn { background-color: #065f46 !important; color: white !important; }
        #toast { visibility: hidden; min-width: 200px; background-color: #333; color: #fff; text-align: center; border-radius: 50px; padding: 12px; position: fixed; z-index: 9999; bottom: 30px; left: 50%; transform: translateX(-50%); }
        #toast.show { visibility: visible; }
        .hidden-section { display: none; }
    </style>
    <script>
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('/sw.js').catch(err => console.log('SW Failed', err));
            });
        }
    </script>
</head>
<body class="py-2 px-3 md:py-4 md:px-4">

    <div id="toast">Copied to clipboard!</div>

    <div class="max-w-7xl mx-auto mb-3 flex flex-wrap justify-center gap-2 bg-white border border-slate-200 py-2 px-4 rounded-2xl shadow-sm text-xs md:text-sm font-bold text-slate-600">
        <button onclick="showSection('emailSection')" class="nav-btn text-emerald-700">Home</button>
        <button onclick="showSection('aboutSection')" class="nav-btn">About Us</button>
        <button onclick="showSection('contactSection')" class="nav-btn">Contact Us</button>
        <button onclick="showSection('privacySection')" class="nav-btn">Privacy Policy</button>
        <button onclick="showSection('disclaimerSection')" class="nav-btn">Disclaimer</button>
    </div>

    <div class="max-w-7xl mx-auto premium-card p-4 md:p-6 rounded-[2rem]">
        
        <div id="emailSection" class="content-section">
            <h1 class="text-3xl font-extrabold text-emerald-950">Email Refiner</h1>
            <div class="grid grid-cols-4 gap-2 my-4">
                <button onclick="setTone(this, 'Professional')" class="tone-btn active-btn p-2 rounded-xl border">Professional</button>
                <button onclick="setTone(this, 'Friendly')" class="tone-btn p-2 rounded-xl border">Friendly</button>
                <button onclick="setTone(this, 'Formal')" class="tone-btn p-2 rounded-xl border">Formal</button>
                <button onclick="setTone(this, 'Concise')" class="tone-btn p-2 rounded-xl border">Concise</button>
            </div>
            <textarea id="input" class="w-full p-4 border-2 rounded-2xl min-h-[200px]" placeholder="Paste your email..."></textarea>
            <button id="refineBtn" onclick="refine()" class="w-full emerald-btn py-4 rounded-2xl font-bold mt-4">Refine My Email</button>
            
            <div id="outputArea" class="hidden border rounded-2xl p-4 mt-6 bg-slate-50">
                <div id="output" class="whitespace-pre-wrap"></div>
                <button onclick="copy('output')" class="mt-4 w-full py-2 bg-emerald-100 rounded-xl font-bold">Copy to Clipboard</button>
            </div>
        </div>

        <div id="aboutSection" class="content-section hidden-section"><h2>About Us Content...</h2></div>
        <div id="contactSection" class="content-section hidden-section"><h2>Contact Us Content...</h2></div>
        <div id="privacySection" class="content-section hidden-section"><h2>Privacy Policy Content...</h2></div>
        <div id="disclaimerSection" class="content-section hidden-section"><h2>Disclaimer Content...</h2></div>
    </div>

    <script>
        let currentTone = 'Professional';

        function showSection(id) {
            document.querySelectorAll('.content-section').forEach(s => s.classList.add('hidden-section'));
            document.getElementById(id).classList.remove('hidden-section');
        }

        function setTone(btn, tone) {
            currentTone = tone;
            document.querySelectorAll('.tone-btn').forEach(b => b.classList.remove('active-btn'));
            btn.classList.add('active-btn');
        }

        async function refine() {
            const inputField = document.getElementById('input');
            const btn = document.getElementById('refineBtn');
            const outputArea = document.getElementById('outputArea');
            
            if (!inputField.value.trim()) { alert("Please enter some text."); return; }

            btn.innerText = "Processing...";
            btn.disabled = true;

            try {
                // یہاں ہم نے /refine کا راستہ استعمال کیا ہے (جو اب نئے فائل سسٹم کے مطابق ہے)
                const response = await fetch("/refine", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ prompt: inputField.value, tone: currentTone })
                });

                const data = await response.json();

                if (!response.ok) {
                    throw new Error(data.error || "Server error: " + response.status);
                }

                document.getElementById('output').innerText = data.refinedEmail;
                outputArea.classList.remove('hidden');
            } catch (error) {
                alert("CRITICAL ERROR: " + error.message);
            } finally {
                btn.innerText = "Refine My Email";
                btn.disabled = false;
            }
        }
        
        function copy(id) {
            const text = document.getElementById(id).innerText;
            navigator.clipboard.writeText(text);
            document.getElementById('toast').classList.add('show');
            setTimeout(() => document.getElementById('toast').classList.remove('show'), 3000);
        }
    </script>
</body>
</html>
