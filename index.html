<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Email Refiner Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-50 text-slate-800 p-4">
    <div class="max-w-xl mx-auto">
        <h1 class="text-3xl font-bold mb-6">Email Refiner Pro</h1>
        
        <div id="toneButtons" class="grid grid-cols-2 gap-3 mb-6">
            <button onclick="selectTone(this)" class="tone-btn p-3 rounded-xl border-2 border-green-600 bg-green-50 font-bold text-green-700">Professional</button>
            <button onclick="selectTone(this)" class="tone-btn p-3 rounded-xl border border-slate-300 font-bold">Friendly</button>
            <button onclick="selectTone(this)" class="tone-btn p-3 rounded-xl border border-slate-300 font-bold">Formal</button>
            <button onclick="selectTone(this)" class="tone-btn p-3 rounded-xl border border-slate-300 font-bold">Concise</button>
        </div>

        <textarea id="input" class="w-full h-32 p-4 rounded-xl border border-slate-300 mb-4" placeholder="Paste your draft here..."></textarea>
        <button onclick="refineEmail()" class="w-full bg-green-600 text-white py-4 rounded-xl font-bold hover:bg-green-700">Refine Email</button>

        <div id="resultBox" class="mt-8 hidden">
            <h3 class="font-bold mb-2">Refined Email:</h3>
            <div id="output" class="bg-white p-4 rounded-xl border border-slate-200 shadow-sm mb-2"></div>
            <button onclick="copyEmail()" class="text-sm bg-slate-800 text-white px-4 py-2 rounded-lg">Copy to Clipboard</button>
        </div>
    </div>

    <script>
        let selectedTone = "Professional";
        function selectTone(btn) {
            document.querySelectorAll('.tone-btn').forEach(b => b.className = "tone-btn p-3 rounded-xl border border-slate-300 font-bold");
            btn.className = "tone-btn p-3 rounded-xl border-2 border-green-600 bg-green-50 font-bold text-green-700";
            selectedTone = btn.innerText;
        }

        async function refineEmail() {
            const text = document.getElementById('input').value;
            const output = document.getElementById('output');
            
            // یہاں آپ کی API KEY محفوظ ہے
            const API_KEY = "Sk-proj-BEmQHgnZfmYGXqT2hMWLB5Hfa0XSgVlTmnwWwtG10HHv0wYZid-UBVxTQoYNiZdxtwEOCi3EzWT3BlbkFJvUuH8xLDPfmwAiEiuozfTlVnAhVVBm_iP9UlRxe6m5MG8fAT3tm4O611sw7RlcBtf-Og5EJBsA";
            
            output.innerText = "Generating...";
            document.getElementById('resultBox').classList.remove('hidden');

            try {
                const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${API_KEY}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ contents: [{ parts: [{ text: `Rewrite this email in a ${selectedTone} tone: ${text}` }] }] })
                });
                const data = await response.json();
                output.innerText = data.candidates[0].content.parts[0].text;
            } catch (error) {
                output.innerText = "Error: Please check your internet or API Key.";
            }
        }

        function copyEmail() {
            navigator.clipboard.writeText(document.getElementById('output').innerText);
            alert("Copied to clipboard!");
        }
    </script>
</body>
</html>
